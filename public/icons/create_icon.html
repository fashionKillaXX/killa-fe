<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function draw(id, size) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = '#000000';
  ctx.font = `italic ${size/6}px Georgia, serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('FitCurry', size/2, size/2);
}
draw('c192', 192);
draw('c512', 512);
alert('Open DevTools, right-click each canvas, and "Save image as" in the icons folder');
</script>
</body>
</html>
